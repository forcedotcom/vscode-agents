name: Publish on Release
run-name: Publishing release ${{ github.event.release.tag_name }}

on:
  release:
    types: [released] # Only when published, not created as draft

jobs:
  extract-version:
    name: Extract Version from Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version
        id: extract
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          # Remove 'v' prefix if present (e.g., v1.8.0 -> 1.8.0)
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION from tag: $TAG_NAME"

  publish-vscode:
    name: Publish to VS Code Marketplace
    needs: [extract-version]
    uses: ./.github/workflows/publishVSCode.yml
    secrets: inherit
    with:
      release-version: ${{ needs.extract-version.outputs.version }}

  publish-openvsx:
    name: Publish to Open VSX Registry
    needs: [extract-version]
    uses: ./.github/workflows/publishOpenVSX.yml
    secrets: inherit
    with:
      release-version: ${{ needs.extract-version.outputs.version }}

  notify-published:
    name: Notify Release Status
    needs: [extract-version, publish-vscode, publish-openvsx]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          VSCODE_STATUS="${{ needs.publish-vscode.result }}"
          OPENVSX_STATUS="${{ needs.publish-openvsx.result }}"

          # Determine overall status and icon
          if [ "$VSCODE_STATUS" = "success" ] && [ "$OPENVSX_STATUS" = "success" ]; then
            echo "icon=✅" >> $GITHUB_OUTPUT
            echo "title=Release v${{ needs.extract-version.outputs.version }} Published Successfully" >> $GITHUB_OUTPUT
            echo "webhook=${{ secrets.CLI_TEAM_SLACK_WEBHOOK_URL }}" >> $GITHUB_OUTPUT
          elif [ "$VSCODE_STATUS" = "success" ] || [ "$OPENVSX_STATUS" = "success" ]; then
            echo "icon=⚠️" >> $GITHUB_OUTPUT
            echo "title=Release v${{ needs.extract-version.outputs.version }} Partially Published" >> $GITHUB_OUTPUT
            echo "webhook=${{ secrets.CLI_ALERTS_SLACK_WEBHOOK }}" >> $GITHUB_OUTPUT
          else
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "title=Release v${{ needs.extract-version.outputs.version }} Publishing Failed" >> $GITHUB_OUTPUT
            echo "webhook=${{ secrets.CLI_ALERTS_SLACK_WEBHOOK }}" >> $GITHUB_OUTPUT
          fi

          # Format status for each marketplace
          if [ "$VSCODE_STATUS" = "success" ]; then
            echo "vscode_text=✅ *VS Code Marketplace:* Published" >> $GITHUB_OUTPUT
          else
            echo "vscode_text=❌ *VS Code Marketplace:* Failed" >> $GITHUB_OUTPUT
          fi

          if [ "$OPENVSX_STATUS" = "success" ]; then
            echo "openvsx_text=✅ *Open VSX:* Published" >> $GITHUB_OUTPUT
          else
            echo "openvsx_text=❌ *Open VSX:* Failed" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        uses: slackapi/slack-github-action@v1.22.0
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.icon }} ${{ steps.status.outputs.title }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.status.outputs.title }}* ${{ steps.status.outputs.icon }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*GitHub Release:*\n<${{ github.event.release.html_url }}|View Release>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}|View Workflow Run>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.status.outputs.vscode_text }}\n${{ steps.status.outputs.openvsx_text }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ steps.status.outputs.webhook }}
